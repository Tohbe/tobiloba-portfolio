    description: An interactive HR analytics solution designed to transform raw
      employee data into clear, decision-ready insights. Built as a reusable
      Excel template enabling HR professionals to quickly analyze workforce
      composition, compensation patterns, and key people metrics.
    featured: true
    link: ""
    image: /images/uploads/screenshot-14-.png
    tools:
      - name: Excel
      - name: Data Modeling
      - name: Visualization
    features:
      - text: Dynamic filtering by department and role
      - text: Real-time metric updates with connected slicers
      - text: Headcount, age bands, income & attrition tracking
      - text: Downloadable, reusable Excel template
  - title: Sales Performance Analysis — Aurum Retail Ltd.
    description: An interactive sales dashboard built for evidence-based business
      strategy, surfacing total sales, profit trends, customer insights, and
